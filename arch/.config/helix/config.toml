theme = "fix_solarized_light"

[editor]
completion-trigger-len = 1
default-yank-register = "+"
end-of-line-diagnostics = "hint"
line-number = "relative"

[editor.cursor-shape]
insert = "bar"
normal = "block"

[editor.inline-diagnostics]
cursor-line = "error"

[editor.soft-wrap]
enable = true

[keys.normal]
# unbind the arrow keys so i get used to vim movement
right = "no_op"
left = "no_op"
down = "no_op"
up = "no_op"
# selection
"," = "collapse_selection"
";" = "keep_primary_selection"
"+" = "flip_selections"
w = "@emiw"
# hover
K = "hover"
# save
z = ":w"
Z = ":w --no-format"
# start and end of line
"$" = "goto_line_end"
"0" = "goto_first_nonwhitespace"
# refactor
F2 = "rename_symbol"
# J and Alt-J
J = "join_selections_space"
A-J = "join_selections"
# tmp
Q = "no_op"

[keys.normal.q]
q = "file_picker_in_current_directory"
e = "file_explorer"
o = "symbol_picker"
t = "workspace_symbol_picker"
z = "global_search"
d = "diagnostics_picker"
D = "workspace_diagnostics_picker"

[keys.normal.g.c]
c = "toggle_comments"
d = "toggle_block_comments"

[keys.select]
right = "no_op"
left = "no_op"
down = "no_op"
up = "no_op"
# selections
"," = "collapse_selection"
";" = "keep_primary_selection"
"+" = "flip_selections"
# save
z = ":w"
Z = ":w --no-format"
# start and end of line
"$" = "goto_line_end"
"0" = "goto_first_nonwhitespace"

[keys.select.q]
q = "file_picker_in_current_directory"
e = "file_explorer"
o = "symbol_picker"
t = "workspace_symbol_picker"
z = "global_search"
d = "diagnostics_picker"
D = "workspace_diagnostics_picker"

[keys.select.g.c]
c = "toggle_comments"
d = "toggle_block_comments"
